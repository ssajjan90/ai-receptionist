server:
  port: 8080

spring:
  application:
    name: ai-receptionist

  datasource:
    url: jdbc:postgresql://localhost:5432/ai_receptionist
    username: aireceptionist
    password: aireceptionist_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

logging:
  level:
    com.aireceptionist: DEBUG
    org.springframework.security: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

openai:
  api:
    key: ${OPENAI_API_KEY:placeholder-key}
    base-url: https://api.openai.com/v1
    model: gpt-4o-mini
    max-tokens: 500
    temperature: 0.7

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
